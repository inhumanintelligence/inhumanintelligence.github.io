<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: rgba(255,255,255,0.045);
      --card2: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.09);
      --text: #f0f0f0;
      --muted: #888;
      --dim: #444;
      --white: #ffffff;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      overflow-x: hidden;
    }

    /* Background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      top: -160px; left: -120px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.028) 0%, transparent 70%);
      bottom: -100px; right: -80px;
    }

    /* Grain overlay */
    .grain {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-top-color: rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 32px;
      opacity: 0;
      animation: up 0.5s ease forwards;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.08) inset,
        0 24px 48px rgba(0,0,0,0.45),
        0 4px 16px rgba(0,0,0,0.3);
    }
    .card + .card { margin-top: 16px; }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.18s; }
    .card.card-roblox { animation-delay: 0.18s; }

    /* Discord card */
    .profile-row { display: flex; align-items: center; gap: 22px; }

    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar-img {
      width: 88px; height: 88px;
      border-radius: 22px;
      object-fit: cover;
      display: block;
      filter: grayscale(30%);
    }
    .status-pip {
      position: absolute; bottom: -3px; right: -3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--dim);
      border: 2.5px solid #0d0d0d;
      transition: background 0.8s;
    }

    .name {
      font-family: 'Fredoka One', cursive;
      font-size: 34px;
      line-height: 1;
      color: var(--white);
    }
    .handle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 600;
    }
    .status-line {
      display: flex; align-items: center; gap: 7px;
      margin-top: 12px;
    }
    .status-dot-sm {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.8s;
      flex-shrink: 0;
    }
    .status-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      transition: color 0.8s;
      letter-spacing: 0.02em;
    }

    /* Activity / Spotify blocks */
    .activity-block {
      margin-top: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.13);
      border-radius: 18px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 8px 24px rgba(0,0,0,0.3);
    }
    .act-thumb {
      width: 56px; height: 56px;
      border-radius: 12px; object-fit: cover;
      flex-shrink: 0; filter: grayscale(40%);
    }
    .act-thumb-placeholder {
      width: 56px; height: 56px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .act-tag {
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 5px;
    }
    .act-name   { font-family: 'Fredoka One', cursive; font-size: 19px; color: var(--white); line-height: 1.1; }
    .act-detail { font-size: 13px; color: var(--muted); margin-top: 3px; font-weight: 600; }
    .act-state  { font-size: 12px; color: var(--dim); margin-top: 2px; }

    .sp-thumb-wrap { position: relative; flex-shrink: 0; }
    .sp-thumb { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; filter: grayscale(50%); }
    .sp-icon {
      position: absolute; bottom: -4px; right: -4px;
      background: #d4d4d4; border-radius: 50%;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .sp-tag { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
    .sp-song   { font-family: 'Fredoka One', cursive; font-size: 19px; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-artist { font-size: 13px; color: var(--muted); margin-top: 3px; font-weight: 600; }
    .sp-bar    { margin-top: 10px; background: rgba(255,255,255,0.08); border-radius: 4px; height: 3px; }
    .sp-fill   { height: 100%; background: rgba(255,255,255,0.7); border-radius: 4px; transition: width 1s linear; width: 0%; }

    .no-activity {
      margin-top: 20px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      font-size: 13px; font-weight: 700;
      color: var(--dim); text-align: center;
    }

    /* Roblox card */
    .card.card-roblox { padding: 0; overflow: hidden; }

    /* Full-body avatar banner */
    .rbx-banner {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 0;
      min-height: 165px;
      background: rgba(255,255,255,0.025);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
    }
    .rbx-banner-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 100%, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .rbx-avatar-full {
      width: 130px;
      height: 165px;
      object-fit: cover;
      object-position: top center;
      flex-shrink: 0;
      filter: grayscale(25%);
      position: relative;
      z-index: 1;
    }
    .rbx-avatar-placeholder {
      width: 130px; height: 165px;
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .rbx-banner-info {
      flex: 1; min-width: 0;
      padding: 22px 22px 22px 16px;
      position: relative; z-index: 1;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .roblox-tag  { font-size: 10px; font-weight: 800; letter-spacing: 0.13em; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
    .roblox-name { font-family: 'Fredoka One', cursive; font-size: 30px; color: var(--white); line-height: 1; }
    .roblox-handle { font-size: 13px; color: var(--muted); margin-top: 5px; font-weight: 600; }
    .roblox-joined { font-size: 11px; color: var(--dim); margin-top: 6px; font-weight: 600; }

    .rbx-banner-btn {
      position: absolute; top: 14px; right: 14px; z-index: 2;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-top-color: rgba(255,255,255,0.22);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 9px;
      font-size: 11px; font-weight: 800;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.03em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.15s, color 0.15s;
    }
    .rbx-banner-btn:hover { background: rgba(255,255,255,0.13); color: var(--white); }

    /* Stats row */
    .rbx-stats {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .rbx-stat {
      flex: 1;
      padding: 20px 0;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .rbx-stat:last-child { border-right: none; }
    .rbx-stat-num { font-family: 'Fredoka One', cursive; font-size: 24px; color: var(--white); line-height: 1; }
    .rbx-stat-label { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-top: 5px; }

    /* Body padding wrapper */
    .rbx-body { padding: 0 26px 24px; }
    /* Roblox in-game status */
    .rbx-game-row {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(74,222,128,0.06);
      border: 1px solid rgba(74,222,128,0.15);
      border-top-color: rgba(74,222,128,0.25);
      border-radius: 16px;
      padding: 14px 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 1px 0 rgba(74,222,128,0.08) inset, 0 6px 20px rgba(0,0,0,0.25);
    }
    .rbx-game-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .rbx-game-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80; flex-shrink: 0;
      box-shadow: 0 0 6px #4ade8088;
      animation: pulse-green 2s ease-in-out infinite;
    }
    .rbx-game-text {
      font-size: 13px; font-weight: 700;
      color: #4ade80;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rbx-join-btn {
      background: rgba(74,222,128,0.12);
      border: 1.5px solid rgba(74,222,128,0.3);
      color: #4ade80;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 11px; font-weight: 800;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .rbx-join-btn:hover { background: rgba(74,222,128,0.22); }
    @keyframes pulse-green {
      0%,100% { opacity: 1; } 50% { opacity: 0.5; }
    }

    .roblox-desc {
      margin-top: 13px;
      padding: 10px 13px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      color: var(--dim);
      font-size: 12px; font-style: italic; font-weight: 600; line-height: 1.6;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
      .name { font-size: 24px; }
      .card:not(.card-roblox) { padding: 18px; }
    }
  </style>
</head>
<body>
<div class="grain"></div>
<div class="container">

  <!-- Discord -->
  <div class="card">
    <div class="profile-row">
      <div class="avatar-wrap">
        <img class="avatar-img" id="dcAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="avatar" />
        <div class="status-pip" id="statusPip"></div>
      </div>
      <div>
        <div class="name" id="dcName">—</div>
        <div class="handle" id="dcHandle">@...</div>
        <div class="status-line">
          <div class="status-dot-sm" id="statusDotSm"></div>
          <div class="status-label" id="statusLabel">offline</div>
        </div>
      </div>
    </div>
    <div id="activityArea"></div>
  </div>

  <!-- Roblox -->
  <div class="card card-roblox">
    <!-- Banner: full-body avatar + name -->
    <div class="rbx-banner">
      <div class="rbx-banner-bg"></div>
      <div id="rbxThumb" class="rbx-avatar-placeholder"></div>
      <div class="rbx-banner-info">
        <div class="roblox-tag">Roblox</div>
        <div class="roblox-name" id="rbxName">—</div>
        <div class="roblox-handle" id="rbxHandle">@...</div>
        <div class="roblox-joined" id="rbxJoined"></div>
      </div>
      <a class="rbx-banner-btn" id="rbxLink" href="#" target="_blank" rel="noopener">view ↗</a>
    </div>
    <!-- Stats -->
    <div class="rbx-stats">
      <div class="rbx-stat">
        <div class="rbx-stat-num" id="rbxFriends">—</div>
        <div class="rbx-stat-label">friends</div>
      </div>
      <div class="rbx-stat">
        <div class="rbx-stat-num" id="rbxFollowers">—</div>
        <div class="rbx-stat-label">followers</div>
      </div>
      <div class="rbx-stat">
        <div class="rbx-stat-num" id="rbxFollowing">—</div>
        <div class="rbx-stat-label">following</div>
      </div>
    </div>
    <!-- Game status + description -->
    <div class="rbx-body">
      <div id="rbxGameStatus"></div>
      <div id="rbxDesc"></div>
    </div>
  </div>

</div>
<script>
  const DISCORD_ID = "1439946318083784866";
  const ROBLOX_ID  = "8499836409";

  const STATUS_LABELS = { online:"online", idle:"idle", dnd:"do not disturb", offline:"offline" };
  const STATUS_BRIGHT = { online:"#d4d4d4", idle:"#999", dnd:"#666", offline:"#444" };

  function applyStatus(s) {
    const color = STATUS_BRIGHT[s] || STATUS_BRIGHT.offline;
    document.getElementById('statusLabel').textContent = STATUS_LABELS[s] || 'offline';
    document.getElementById('statusLabel').style.color = color;
    document.getElementById('statusDotSm').style.background = color;
    document.getElementById('statusPip').style.background   = color;
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function assetUrl(appId, key) {
    if (!key) return null;
    if (key.startsWith('mp:external/')) return 'https://media.discordapp.net/external/' + key.replace('mp:external/','');
    return `https://cdn.discordapp.com/app-assets/${appId}/${key}.png`;
  }

  let spInterval = null;

  function updateRobloxGameStatus(robloxActivity) {
    const area = document.getElementById('rbxGameStatus');
    if (!robloxActivity) { area.innerHTML = ''; return; }

    // Try to extract place ID from activity metadata or large_image key
    const largeImg = robloxActivity.assets?.large_image || '';
    // large_image is sometimes "game_icon_PLACEID" or just numeric
    const placeIdMatch = largeImg.match(/(\d{6,})/);
    const placeId = placeIdMatch ? placeIdMatch[1] : null;

    // Game name — Roblox RPC puts it in details
    const gameName = robloxActivity.details || 'a game';

    const joinUrl = placeId
      ? `https://www.roblox.com/games/${placeId}`
      : `https://www.roblox.com/users/${ROBLOX_ID}/profile`;

    area.innerHTML = `
      <div class="rbx-game-row">
        <div class="rbx-game-left">
          <div class="rbx-game-dot"></div>
          <span class="rbx-game-text">playing ${esc(gameName)}</span>
        </div>
        <a class="rbx-join-btn" href="${joinUrl}" target="_blank" rel="noopener">join ↗</a>
      </div>`;
  }

  function renderActivity(activities, spotify) {
    const area = document.getElementById('activityArea');
    area.innerHTML = '';
    if (spInterval) { clearInterval(spInterval); spInterval = null; }

    const acts = (activities||[]).filter(a => a.type !== 2);

    // Detect Roblox activity and update roblox card
    const robloxAct = acts.find(a => a.name?.toLowerCase() === 'roblox');
    updateRobloxGameStatus(robloxAct || null);

    if (spotify) {
      const elapsed = Date.now() - spotify.timestamps.start;
      const total   = spotify.timestamps.end - spotify.timestamps.start;
      const pct     = Math.min((elapsed/total)*100,100).toFixed(1);
      const el = document.createElement('div');
      el.className = 'activity-block';
      el.innerHTML = `
        <div class="sp-thumb-wrap">
          <img class="sp-thumb" src="${esc(spotify.album_art_url)}" alt="album" />
          <div class="sp-icon">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="#111">
              <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
            </svg>
          </div>
        </div>
        <div style="flex:1;min-width:0;">
          <div class="sp-tag">listening</div>
          <div class="sp-song">${esc(spotify.song)}</div>
          <div class="sp-artist">${esc(spotify.artist)}</div>
          <div class="sp-bar"><div class="sp-fill" id="spFill" style="width:${pct}%"></div></div>
        </div>`;
      area.appendChild(el);
      spInterval = setInterval(() => {
        const fill = document.getElementById('spFill');
        if (!fill) { clearInterval(spInterval); return; }
        const e2 = Date.now() - spotify.timestamps.start;
        fill.style.width = Math.min((e2/total)*100,100).toFixed(1)+'%';
      }, 1000);
    }

    if (acts[0]) {
      const a = acts[0];
      const thumb = assetUrl(a.application_id, a.assets?.large_image);
      const el = document.createElement('div');
      el.className = 'activity-block';
      el.innerHTML = `
        ${thumb
          ? `<img class="act-thumb" src="${thumb}" alt="${esc(a.name)}" onerror="this.style.display='none'" />`
          : `<div class="act-thumb-placeholder"></div>`}
        <div style="flex:1;min-width:0;">
          <div class="act-tag">playing</div>
          <div class="act-name">${esc(a.name)}</div>
          ${a.details ? `<div class="act-detail">${esc(a.details)}</div>` : ''}
          ${a.state   ? `<div class="act-state">${esc(a.state)}</div>`   : ''}
        </div>`;
      area.appendChild(el);
    }

    if (!acts[0] && !spotify) {
      area.innerHTML = `<div class="no-activity">not doing anything</div>`;
    }
  }

  async function fetchLanyard() {
    try {
      const r = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const d = (await r.json()).data;
      if (!d) return;
      const u = d.discord_user;
      if (u.avatar) {
        const ext = u.avatar.startsWith('a_') ? 'gif' : 'png';
        document.getElementById('dcAvatar').src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${u.avatar}.${ext}?size=256`;
      }
      document.getElementById('dcName').textContent   = u.global_name || u.username || '—';
      document.getElementById('dcHandle').textContent = '@' + (u.username || '...');
      applyStatus(d.discord_status);
      renderActivity(d.activities, d.spotify);
    } catch(e) {}
  }

  function fmtNum(n) {
    if (n === undefined || n === null) return '—';
    if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
    if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'k';
    return String(n);
  }

  async function fetchRoblox() {
    try {
      const [userRes, avatarRes, friendsRes, followersRes, followingRes] = await Promise.all([
        fetch(`https://users.roblox.com/v1/users/${ROBLOX_ID}`),
        fetch(`https://thumbnails.roblox.com/v1/users/avatar?userIds=${ROBLOX_ID}&size=420x420&format=Png&isCircular=false`),
        fetch(`https://friends.roblox.com/v1/users/${ROBLOX_ID}/friends/count`),
        fetch(`https://friends.roblox.com/v1/users/${ROBLOX_ID}/followers/count`),
        fetch(`https://friends.roblox.com/v1/users/${ROBLOX_ID}/followings/count`),
      ]);

      const user      = await userRes.json();
      const avatar    = await avatarRes.json();
      const friends   = await friendsRes.json().catch(()=>({}));
      const followers = await followersRes.json().catch(()=>({}));
      const following = await followingRes.json().catch(()=>({}));

      document.getElementById('rbxName').textContent   = user.displayName || user.name || '—';
      document.getElementById('rbxHandle').textContent = '@' + (user.name || '...');
      document.getElementById('rbxLink').href = `https://www.roblox.com/users/${ROBLOX_ID}/profile`;

      // Join date
      if (user.created) {
        const d = new Date(user.created);
        const joined = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        document.getElementById('rbxJoined').textContent = 'joined ' + joined;
      }

      // Full body avatar
      const imgUrl = avatar.data?.[0]?.imageUrl;
      if (imgUrl) {
        const wrap = document.getElementById('rbxThumb');
        const img = document.createElement('img');
        img.id = 'rbxThumb';
        img.className = 'rbx-avatar-full';
        img.src = imgUrl;
        img.alt = 'roblox avatar';
        wrap.replaceWith(img);
      }

      // Stats
      document.getElementById('rbxFriends').textContent   = fmtNum(friends.count);
      document.getElementById('rbxFollowers').textContent = fmtNum(followers.count);
      document.getElementById('rbxFollowing').textContent = fmtNum(following.count);

      // Description
      if (user.description) {
        document.getElementById('rbxDesc').innerHTML =
          `<div class="roblox-desc">"${esc(user.description)}"</div>`;
      }
    } catch(e) { console.warn('Roblox error', e); }
  }

  fetchLanyard();
  fetchRoblox();
  setInterval(fetchLanyard, 10000);
</script>
</body>
</html>
