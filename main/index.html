<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kay</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow-x: hidden; padding: 48px 24px;
    background: #080808;
  }
  @media (max-width: 380px) { body { padding: 24px 12px; } }

  /* ── AVATAR BACKGROUND — more color ── */
  #bg-avatar {
    position: fixed; inset: -80px; z-index: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    /* more brightness + saturation = real colors showing */
    filter: blur(72px) saturate(2.2) brightness(0.52);
    transform: scale(1.15);
    transition: background-image 1.4s ease;
  }
  /* lighter dark overlay so color bleeds through */
  #bg-avatar::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.30);
  }

  .bg-grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 160px 160px;
    opacity: 0.025;
  }

  .vignette {
    position: fixed; inset: 0; z-index: 2;
    background: radial-gradient(ellipse at center,
      transparent 0%, rgba(0,0,0,0.10) 35%, rgba(0,0,0,0.55) 65%, rgba(0,0,0,0.92) 100%);
  }

  .scanlines {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: repeating-linear-gradient(to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px);
  }

  /* ── ENTER SCREEN ── */
  #enter-screen {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.9s ease;
  }
  #enter-screen.hiding { opacity: 0; pointer-events: none; }
  .enter-label {
    font-family: 'Fredoka One', cursive;
    font-size: 18px; letter-spacing: 3.5px;
    color: rgba(255,255,255,0.5);
    text-transform: lowercase;
    animation: labelBreath 3s ease-in-out infinite;
  }
  @keyframes labelBreath { 0%,100%{opacity:0.2;} 50%{opacity:0.65;} }

  /* ── MAIN WRAP ── */
  #main-wrap {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    width: 100%; max-width: 390px;
    filter: blur(20px) brightness(0.15);
    opacity: 0; pointer-events: none;
    transition: filter 1.5s cubic-bezier(0.23,1,0.32,1), opacity 1.1s ease;
  }
  #main-wrap.revealed { filter: blur(0) brightness(1); opacity: 1; pointer-events: all; }

  #main-wrap .avatar-wrap,
  #main-wrap .name-section,
  #main-wrap .bio,
  #main-wrap .discord-status,
  #main-wrap .custom-status,
  #main-wrap .now-playing,
  #main-wrap .social-buttons {
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.65s ease, transform 0.65s cubic-bezier(0.23,1,0.32,1);
  }
  #main-wrap.revealed .avatar-wrap    { opacity:1; transform:translateY(0); transition-delay:0.20s; }
  #main-wrap.revealed .name-section   { opacity:1; transform:translateY(0); transition-delay:0.32s; }
  #main-wrap.revealed .bio            { opacity:1; transform:translateY(0); transition-delay:0.40s; }
  #main-wrap.revealed .discord-status { opacity:1; transform:translateY(0); transition-delay:0.48s; }
  #main-wrap.revealed .custom-status  { opacity:1; transform:translateY(0); transition-delay:0.54s; }
  #main-wrap.revealed .now-playing    { opacity:1; transform:translateY(0); transition-delay:0.64s; }
  #main-wrap.revealed .social-buttons { opacity:1; transform:translateY(0); transition-delay:0.76s; }

  /* ── CARD — glass lets color through ── */
  .card-wrap {
    width: 100%;
    animation: popIn 0.75s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.94) translateY(22px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .card {
    width: 100%;
    /* very transparent so bg colors bleed through */
    background: linear-gradient(135deg,
      rgba(255,255,255,0.10) 0%,
      rgba(255,255,255,0.05) 50%,
      rgba(255,255,255,0.025) 100%);
    backdrop-filter: blur(36px) saturate(1.6) brightness(0.75);
    -webkit-backdrop-filter: blur(36px) saturate(1.6) brightness(0.75);
    border-radius: 28px;
    border-top:    1px solid rgba(255,255,255,0.18);
    border-left:   1px solid rgba(255,255,255,0.12);
    border-right:  1px solid rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    padding: 42px 36px 38px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.14) inset,
      0 0 80px rgba(255,255,255,0.03) inset,
      0 32px 80px rgba(0,0,0,0.55),
      0 8px 20px rgba(0,0,0,0.35);
    will-change: transform;
    transition: box-shadow 0.5s ease;
  }
  .card:hover {
    box-shadow:
      0 1px 0 rgba(255,255,255,0.18) inset,
      0 0 90px rgba(255,255,255,0.04) inset,
      0 36px 90px rgba(0,0,0,0.6),
      0 10px 24px rgba(0,0,0,0.4);
  }
  @media (max-width:380px) { .card { padding:28px 20px 26px; } }

  /* ── AVATAR ── */
  .avatar-wrap {
    position: relative; width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center; overflow: visible;
  }
  .avatar-svg-ring {
    position: absolute; inset: -10px;
    width: calc(100% + 20px); height: calc(100% + 20px);
    pointer-events: none; z-index: 3;
  }
  .avatar {
    width: 114px; height: 114px; border-radius: 50%;
    overflow: hidden; background: #111;
    position: relative; z-index: 1; cursor: pointer;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12),
      0 6px 32px rgba(0,0,0,0.65),
      0 2px 8px rgba(0,0,0,0.4);
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
  }
  .avatar:hover { transform: scale(1.07) rotate(-3deg); }
  .avatar.wiggle { animation: avatarWiggle 0.5s cubic-bezier(0.36,0.07,0.19,0.97); }
  @keyframes avatarWiggle {
    0%,100% { transform:rotate(0deg) scale(1); }
    15% { transform:rotate(-6deg) scale(1.05); }
    30% { transform:rotate(6deg)  scale(1.05); }
    45% { transform:rotate(-4deg) scale(1.02); }
    60% { transform:rotate(4deg)  scale(1.02); }
    75% { transform:rotate(-2deg) scale(1.01); }
  }
  .avatar img { width:100%; height:100%; object-fit:cover; object-position:center; display:block; pointer-events:none; }

  .avatar-badge {
    position: absolute; bottom: 6px; right: 6px;
    width: 20px; height: 20px;
    border: 3px solid rgba(8,8,10,0.85);
    border-radius: 50%; background: #747f8d;
    transition: background 0.4s, box-shadow 0.4s; z-index: 4;
  }
  .avatar-badge.online  { background:#23a55a; box-shadow:0 0 8px rgba(35,165,90,0.6); }
  .avatar-badge.idle    {
    background:#f0b232; box-shadow:0 0 8px rgba(240,178,50,0.55);
    -webkit-mask:radial-gradient(circle at 100% 0%,transparent 55%,black 56%);
    mask:radial-gradient(circle at 100% 0%,transparent 55%,black 56%);
  }
  .avatar-badge.dnd     { background:#f23f43; box-shadow:0 0 8px rgba(242,63,67,0.55); }
  .avatar-badge.dnd::after {
    content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:55%; height:2.5px; background:#08080a; border-radius:2px;
  }
  .avatar-badge.offline { background:#252525; border-color:rgba(255,255,255,0.07); box-shadow:none; }

  /* ── NAME ── */
  .name-section { display:flex; flex-direction:column; align-items:center; gap:5px; }
  h1 {
    font-size:30px; font-weight:900; letter-spacing:-0.4px;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 1px 0 rgba(255,255,255,0.1), 0 4px 20px rgba(0,0,0,0.5);
  }
  .handle { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color: rgba(255,255,255,0.32); }

  /* ── STATUS PILL ── */
  .discord-status {
    display:flex; align-items:center; gap:8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius:100px; padding:5px 15px;
    backdrop-filter: blur(16px);
  }
  .status-indicator { width:8px; height:8px; flex-shrink:0; position:relative; }
  .status-indicator.online  { border-radius:50%; background:#23a55a; box-shadow:0 0 5px rgba(35,165,90,0.5); }
  .status-indicator.idle    {
    border-radius:50%; background:#f0b232; box-shadow:0 0 5px rgba(240,178,50,0.45);
    -webkit-mask:radial-gradient(circle at 100% 0%,transparent 50%,black 51%);
    mask:radial-gradient(circle at 100% 0%,transparent 50%,black 51%);
  }
  .status-indicator.dnd     { border-radius:50%; background:#f23f43; box-shadow:0 0 5px rgba(242,63,67,0.45); }
  .status-indicator.dnd::after {
    content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:60%; height:1.5px; background:#08080a; border-radius:1px;
  }
  .status-indicator.offline { border-radius:50%; background:transparent; border:1.5px solid rgba(255,255,255,0.25); }
  .status-label { font-size:10px; font-weight:700; color:rgba(255,255,255,0.45); letter-spacing:0.8px; text-transform:uppercase; }

  /* ── CUSTOM STATUS ── */
  .custom-status {
    font-size:11px; font-weight:700; color:rgba(255,255,255,0.38); letter-spacing:0.3px;
    max-width:260px; text-align:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:none;
  }

  /* ── NOW PLAYING ── */
  .now-playing {
    width:100%;
    background: rgba(255,255,255,0.06);
    border-top: 1px solid rgba(255,255,255,0.12);
    border-left: 1px solid rgba(255,255,255,0.08);
    border-right: 1px solid rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.015);
    border-radius:16px; padding:13px 15px 15px;
    display:none; flex-direction:column; gap:10px;
    backdrop-filter: blur(20px);
  }
  .now-playing.visible { display:flex; }
  .now-playing-top { display:flex; align-items:center; gap:11px; }
  .spotify-art {
    width:36px; height:36px; border-radius:7px; object-fit:cover;
    flex-shrink:0; display:none; background:#111;
    box-shadow:0 2px 12px rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.10);
  }
  .spotify-art.loaded { display:block; }
  .bars { display:flex; align-items:flex-end; gap:2px; height:14px; flex-shrink:0; }
  .bar { width:3px; border-radius:2px; background:#1DB954; animation:bounce var(--d) ease-in-out infinite alternate; }
  .bar:nth-child(1){--d:.6s;height:5px;} .bar:nth-child(2){--d:.4s;height:13px;}
  .bar:nth-child(3){--d:.7s;height:9px;} .bar:nth-child(4){--d:.5s;height:14px;}
  @keyframes bounce { from{transform:scaleY(0.3);} to{transform:scaleY(1);} }
  .track-info { display:flex; flex-direction:column; gap:2px; overflow:hidden; flex:1; }
  .track-label  { font-size:8px; font-weight:800; color:#1DB954; letter-spacing:1.4px; text-transform:uppercase; margin-bottom:1px; }
  .track-name   { font-size:12px; font-weight:800; color:rgba(255,255,255,0.92); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track-artist { font-size:11px; font-weight:600; color:rgba(255,255,255,0.45); }
  .track-album  { font-size:10px; font-weight:600; color:rgba(255,255,255,0.25); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .progress-wrap { width:100%; display:flex; flex-direction:column; gap:4px; }
  .progress-track { width:100%; height:2px; background:rgba(255,255,255,0.10); border-radius:2px; overflow:hidden; }
  .progress-fill  { height:100%; background:#1DB954; border-radius:2px; width:0%; transition:width 1s linear; }
  .progress-times { display:flex; justify-content:space-between; font-size:9px; font-weight:700; color:rgba(255,255,255,0.28); letter-spacing:0.3px; }

  /* ── BIO ── */
  .bio {
    font-size:11px; font-weight:700;
    color:rgba(255,255,255,0.38); letter-spacing:1px;
    text-align:center; min-height:18px; text-transform:uppercase;
  }
  .bio-cursor {
    display:inline-block; width:1px; height:10px;
    background:rgba(255,255,255,0.38); margin-left:2px; vertical-align:middle;
    animation:cursorBlink 0.9s ease-in-out infinite;
  }
  @keyframes cursorBlink { 0%,100%{opacity:1;} 50%{opacity:0;} }

  /* ── DIVIDER ── */
  .divider {
    width:100%; height:1px;
    background: linear-gradient(90deg,
      transparent 0%, rgba(255,255,255,0.12) 25%, rgba(255,255,255,0.12) 75%, transparent 100%);
  }

  /* ── SOCIAL BUTTONS ── */
  .social-buttons { display:flex; justify-content:center; gap:12px; width:100%; }
  .social-btn {
    position:relative; display:flex; align-items:center; justify-content:center;
    width:52px; height:52px; border-radius:50%;
    background: rgba(255,255,255,0.08);
    border-top:  1px solid rgba(255,255,255,0.16);
    border-left: 1px solid rgba(255,255,255,0.11);
    border-right:  1px solid rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    cursor:pointer; overflow:hidden; text-decoration:none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.10) inset;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease, background 0.3s ease;
  }
  .social-btn svg { width:19px; height:19px; fill:currentColor; position:relative; z-index:1; }
  .social-btn::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,0.09) 0%, transparent 60%);
    border-radius:50%; pointer-events:none;
  }
  .social-btn:hover  { transform:scale(1.12) rotate(3deg); background:rgba(255,255,255,0.13); box-shadow:0 6px 22px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.14) inset; }
  .social-btn:active { transform:scale(0.93); transition-duration:0.1s; }
  .social-btn.roblox  { color:rgba(240,240,240,0.7); }
  .social-btn.discord { color:rgba(220,220,220,0.6); }
  .social-btn.roblox:hover, .social-btn.discord:hover { color:rgba(255,255,255,0.95); }

  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  /* ── MESSAGE BOX ── */
  .msg-box {
    width: 100%; display: flex; flex-direction: column; gap: 10px;
  }
  .msg-label {
    font-size: 10px; font-weight: 800; letter-spacing: 1.2px;
    text-transform: uppercase; color: rgba(255,255,255,0.28);
    text-align: center;
  }
  .msg-textarea {
    width: 100%; min-height: 80px; resize: none;
    background: rgba(255,255,255,0.05);
    border-top:  1px solid rgba(255,255,255,0.12);
    border-left: 1px solid rgba(255,255,255,0.08);
    border-right:  1px solid rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.02);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.85);
    outline: none;
    backdrop-filter: blur(16px);
    transition: border-color 0.2s ease, background 0.2s ease;
    caret-color: rgba(255,255,255,0.6);
  }
  .msg-textarea::placeholder { color: rgba(255,255,255,0.22); }
  .msg-textarea:focus {
    background: rgba(255,255,255,0.07);
    border-top-color: rgba(255,255,255,0.22);
    border-left-color: rgba(255,255,255,0.14);
  }
  .msg-row { display: flex; align-items: center; gap: 10px; }
  .msg-name {
    flex: 1; height: 38px;
    background: rgba(255,255,255,0.05);
    border-top:  1px solid rgba(255,255,255,0.12);
    border-left: 1px solid rgba(255,255,255,0.08);
    border-right:  1px solid rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.02);
    border-radius: 10px;
    padding: 0 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.85);
    outline: none;
    backdrop-filter: blur(16px);
    transition: border-color 0.2s ease, background 0.2s ease;
    caret-color: rgba(255,255,255,0.6);
  }
  .msg-name::placeholder { color: rgba(255,255,255,0.22); }
  .msg-name:focus {
    background: rgba(255,255,255,0.07);
    border-top-color: rgba(255,255,255,0.22);
    border-left-color: rgba(255,255,255,0.14);
  }
  .msg-send {
    height: 38px; padding: 0 18px;
    background: rgba(255,255,255,0.10);
    border-top:  1px solid rgba(255,255,255,0.18);
    border-left: 1px solid rgba(255,255,255,0.13);
    border-right:  1px solid rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: rgba(255,255,255,0.80);
    cursor: pointer;
    backdrop-filter: blur(16px);
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), background 0.2s ease, color 0.2s ease;
    white-space: nowrap;
  }
  .msg-send:hover { background: rgba(255,255,255,0.16); color: rgba(255,255,255,0.98); transform: scale(1.04); }
  .msg-send:active { transform: scale(0.96); }
  .msg-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .msg-feedback {
    font-size: 11px; font-weight: 700; text-align: center;
    min-height: 16px; letter-spacing: 0.3px;
    opacity: 0; transition: opacity 0.3s ease;
    color: rgba(255,255,255,0.5);
  }
  .msg-feedback.visible { opacity: 1; }
  .msg-feedback.success { color: #23a55a; }
  .msg-feedback.error   { color: #f23f43; }
  .msg-feedback.cooldown { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div id="bg-avatar" aria-hidden="true"></div>
<div class="bg-grain" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>
<div class="scanlines" aria-hidden="true"></div>
<div aria-live="polite" aria-atomic="true" class="sr-only" id="ariaStatus"></div>

<div id="enter-screen" role="button" tabindex="0" aria-label="Click to enter">
  <span class="enter-label">click to enter</span>
</div>

<div id="main-wrap" role="region" aria-label="Kay's profile">
  <div class="card-wrap">
    <div class="card" id="card">

      <div class="avatar-wrap" aria-hidden="true">
        <svg class="avatar-svg-ring" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="rgba(255,255,255,0.7)"/>
              <stop offset="30%"  stop-color="rgba(255,255,255,0.3)"/>
              <stop offset="65%"  stop-color="rgba(255,255,255,0.10)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
            </linearGradient>
          </defs>
          <circle cx="70" cy="70" r="66" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
          <circle cx="70" cy="70" r="61"
            stroke="url(#ringGrad)" stroke-width="1.5" fill="none"
            stroke-linecap="round" stroke-dasharray="330 55" stroke-dashoffset="60"/>
        </svg>
        <div class="avatar" id="avatarEl">
          <img id="avatarImg" src="" alt="Kay's avatar">
        </div>
        <div class="avatar-badge" id="avatarBadge"></div>
      </div>

      <div class="name-section">
        <h1 id="displayName">Kay</h1>
        <span class="handle" id="handleEl" aria-label="Discord handle">@tmsu</span>
      </div>

      <p class="bio" id="bio"><span id="bioText"></span><span class="bio-cursor" id="bioCursor"></span></p>

      <div class="discord-status" aria-label="Discord status">
        <div class="status-indicator" id="statusIndicator" aria-hidden="true"></div>
        <span class="status-label" id="statusLabel">...</span>
      </div>

      <span class="custom-status" id="customStatus" role="note"></span>

      <div class="now-playing" id="nowPlaying" role="status" aria-label="Now playing on Spotify">
        <div class="now-playing-top">
          <img class="spotify-art" id="spotifyArt" src="" alt="Album art">
          <div class="bars" aria-hidden="true">
            <div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div>
          </div>
          <div class="track-info">
            <span class="track-label">Listening on Spotify</span>
            <span class="track-name"   id="trackName">—</span>
            <span class="track-artist" id="trackArtist">—</span>
            <span class="track-album"  id="trackAlbum">—</span>
          </div>
        </div>
        <div class="progress-wrap" id="progressWrap" style="display:none">
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-times" aria-hidden="true">
            <span id="timeElapsed">0:00</span>
            <span id="timeDuration">0:00</span>
          </div>
        </div>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <div class="social-buttons" role="list" aria-label="Social links">
        <a href="https://www.roblox.com/users/8499836409/profile" target="_blank" rel="noopener" class="social-btn roblox" role="listitem" aria-label="Roblox">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M5.164 0L.16 18.928L18.836 24L23.84 5.072L5.164 0ZM14.023 15.208L8.792 13.469L10.436 8.152L15.667 9.891L14.023 15.208Z"/>
          </svg>
        </a>
        <a href="https://discord.com/users/1439946318083784866" target="_blank" rel="noopener" class="social-btn discord" role="listitem" aria-label="Discord">
          <svg viewBox="0 0 640 512" xmlns="http://www.w3.org/2000/svg">
            <path d="M524.531 69.836a1.5 1.5 0 0 0-.764-.7A485.065 485.065 0 0 0 404.081 32.03a1.816 1.816 0 0 0-1.923.91 337.461 337.461 0 0 0-14.9 30.6 447.848 447.848 0 0 0-134.426 0 309.541 309.541 0 0 0-15.135-30.6 1.89 1.89 0 0 0-1.924-.91 483.689 483.689 0 0 0-119.688 37.107 1.712 1.712 0 0 0-.788.676C39.068 183.651 18.186 294.69 28.43 404.354a2.016 2.016 0 0 0 .765 1.375 487.666 487.666 0 0 0 146.825 74.189 1.9 1.9 0 0 0 2.063-.676A348.2 348.2 0 0 0 208.12 430.4a1.86 1.86 0 0 0-1.019-2.588 321.173 321.173 0 0 1-45.868-21.853 1.885 1.885 0 0 1-.185-3.126 251.047 251.047 0 0 0 9.109-7.137 1.819 1.819 0 0 1 1.9-.256c96.229 43.917 200.41 43.917 295.5 0a1.812 1.812 0 0 1 1.924.233 234.533 234.533 0 0 0 9.132 7.16 1.884 1.884 0 0 1-.162 3.126 301.407 301.407 0 0 1-45.89 21.83 1.875 1.875 0 0 0-1 2.611 391.055 391.055 0 0 0 30.014 48.815 1.864 1.864 0 0 0 2.063.7A486.048 486.048 0 0 0 610.7 405.729a1.882 1.882 0 0 0 .765-1.352c12.264-126.783-20.532-236.912-86.934-334.541zM222.491 337.58c-28.972 0-52.844-26.587-52.844-59.239s23.409-59.241 52.844-59.241c29.665 0 53.306 26.82 52.843 59.239 0 32.654-23.41 59.241-52.843 59.241zm195.38 0c-28.971 0-52.843-26.587-52.843-59.239s23.409-59.241 52.843-59.241c29.667 0 53.307 26.82 52.844 59.239 0 32.654-23.177 59.241-52.844 59.241z"/>
          </svg>
        </a>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <!-- MESSAGE BOX -->
      <div class="msg-box">
        <span class="msg-label">leave a message</span>
        <div class="msg-row">
          <input class="msg-name" id="msgName" type="text" maxlength="32" placeholder="your name (leave blank if anonymous)">
          <button class="msg-send" id="msgSend">Send</button>
        </div>
        <textarea class="msg-textarea" id="msgText" maxlength="280" placeholder="say something..."></textarea>
        <div class="msg-feedback" id="msgFeedback"></div>
      </div>

    </div>
  </div>
</div>

<script>
  const DISCORD_ID   = '1439946318083784866';
  const LANYARD_HTTP = `https://api.lanyard.rest/v1/users/${DISCORD_ID}`;
  const LANYARD_WS   = 'wss://api.lanyard.rest/socket';

  const enterScreen     = document.getElementById('enter-screen');
  const mainWrap        = document.getElementById('main-wrap');
  const card            = document.getElementById('card');
  const avatarEl        = document.getElementById('avatarEl');
  const avatarImg       = document.getElementById('avatarImg');
  const avatarBadge     = document.getElementById('avatarBadge');
  const bgAvatar        = document.getElementById('bg-avatar');
  const statusIndicator = document.getElementById('statusIndicator');
  const statusLabel     = document.getElementById('statusLabel');
  const customStatus    = document.getElementById('customStatus');
  const nowPlaying      = document.getElementById('nowPlaying');
  const spotifyArt      = document.getElementById('spotifyArt');
  const trackName       = document.getElementById('trackName');
  const trackArtist     = document.getElementById('trackArtist');
  const trackAlbum      = document.getElementById('trackAlbum');
  const progressWrap    = document.getElementById('progressWrap');
  const progressFill    = document.getElementById('progressFill');
  const timeElapsed     = document.getElementById('timeElapsed');
  const timeDuration    = document.getElementById('timeDuration');
  const ariaStatus      = document.getElementById('ariaStatus');
  const displayName     = document.getElementById('displayName');
  const handleEl        = document.getElementById('handleEl');

  const STATUS_LABELS = { online:'Online', idle:'Idle', dnd:'Do Not Disturb', offline:'Offline' };

  const bioText   = document.getElementById('bioText');
  const bioCursor = document.getElementById('bioCursor');
  const BIO = 'i love my friends';
  let bioIndex = 0;
  function typeBio() {
    if (bioIndex <= BIO.length) { bioText.textContent = BIO.slice(0, bioIndex++); setTimeout(typeBio, 80); }
    else { setTimeout(() => bioCursor.style.display = 'none', 1400); }
  }
  const revealObserver = new MutationObserver(() => {
    if (mainWrap.classList.contains('revealed')) { revealObserver.disconnect(); setTimeout(typeBio, 700); }
  });
  revealObserver.observe(mainWrap, { attributes: true });

  let entered = false;
  function doEnter() {
    if (entered) return; entered = true;
    enterScreen.classList.add('hiding');
    mainWrap.classList.add('revealed');
    setTimeout(() => enterScreen.remove(), 1000);
  }
  enterScreen.addEventListener('click', doEnter);
  enterScreen.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') doEnter(); });

  avatarEl.addEventListener('click', () => { avatarEl.classList.remove('wiggle'); void avatarEl.offsetWidth; avatarEl.classList.add('wiggle'); });
  avatarEl.addEventListener('animationend', () => avatarEl.classList.remove('wiggle'));

  let progressRAF=null, trackStart=null, trackEnd=null;
  function fmtMs(ms) { const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
  function tickProgress() {
    if (!trackStart||!trackEnd) return;
    const elapsed=Math.min(Date.now()-trackStart,trackEnd-trackStart);
    const pct=Math.min((elapsed/(trackEnd-trackStart))*100,100);
    progressFill.style.width=pct+'%'; timeElapsed.textContent=fmtMs(elapsed); timeDuration.textContent=fmtMs(trackEnd-trackStart);
    if (pct<100) progressRAF=requestAnimationFrame(tickProgress);
  }
  function startProgress(s,e) { cancelAnimationFrame(progressRAF); trackStart=s; trackEnd=e; progressWrap.style.display='flex'; tickProgress(); }
  function stopProgress()     { cancelAnimationFrame(progressRAF); progressWrap.style.display='none'; trackStart=trackEnd=null; }

  let lastAvatar = null;
  function setAvatar(url) {
    if (url === lastAvatar) return;
    lastAvatar = url;
    avatarImg.src = url;
    bgAvatar.style.backgroundImage = `url('${url}')`;
  }

  let lastStatus = null;
  function applyPresence(data) {
    const status = data.discord_status || 'offline';
    if (status !== lastStatus) { ariaStatus.textContent = `Status changed to ${STATUS_LABELS[status]||status}`; lastStatus = status; }
    avatarBadge.className     = 'avatar-badge ' + status;
    statusIndicator.className = 'status-indicator ' + status;
    statusLabel.textContent   = STATUS_LABELS[status] || status;

    const user = data.discord_user;
    if (user) {
      const name = user.global_name || user.username || 'Kay';
      const handle = user.username || 'tmsu';
      displayName.textContent = name;
      handleEl.textContent    = '@' + handle;
      handleEl.setAttribute('aria-label', 'Discord handle @' + handle);
      document.title = name;
      if (user.avatar) {
        const ext = user.avatar.startsWith('a_') ? 'gif' : 'webp';
        setAvatar(`https://cdn.discordapp.com/avatars/${DISCORD_ID}/${user.avatar}.${ext}?size=512`);
      } else {
        const idx = Number(BigInt(DISCORD_ID) % 6n);
        setAvatar(`https://cdn.discordapp.com/embed/avatars/${idx}.png`);
      }
    }

    const cs = (data.activities||[]).find(a=>a.type===4);
    if (cs&&(cs.state||cs.emoji?.name)) { customStatus.textContent=(cs.emoji?.name?cs.emoji.name+' ':'')+( cs.state||''); customStatus.style.display='block'; }
    else customStatus.style.display='none';

    const sp = data.spotify;
    if (status!=='offline'&&sp) {
      trackName.textContent=sp.song||'—'; trackArtist.textContent=sp.artist||'—'; trackAlbum.textContent=sp.album||'—';
      if (sp.album_art_url) { spotifyArt.src=sp.album_art_url; spotifyArt.onload=()=>spotifyArt.classList.add('loaded'); spotifyArt.onerror=()=>spotifyArt.classList.remove('loaded'); }
      nowPlaying.classList.add('visible');
      if (sp.timestamps?.start&&sp.timestamps?.end) startProgress(sp.timestamps.start,sp.timestamps.end); else stopProgress();
    } else { nowPlaying.classList.remove('visible'); spotifyArt.classList.remove('loaded'); stopProgress(); }
  }

  function connectWS() {
    const ws=new WebSocket(LANYARD_WS); let hb,subscribed=false;
    ws.onmessage=({data})=>{
      const msg=JSON.parse(data);
      if (msg.op===1) {
        if (!subscribed) { ws.send(JSON.stringify({op:2,d:{subscribe_to_id:DISCORD_ID}})); subscribed=true; }
        hb=setInterval(()=>{ if(ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({op:3})); },msg.d.heartbeat_interval);
      }
      if (msg.op===0) applyPresence(msg.d);
    };
    ws.onclose=()=>{ clearInterval(hb); setTimeout(connectWS,3000); };
    ws.onerror=()=>ws.close();
  }
  fetch(LANYARD_HTTP).then(r=>r.json()).then(j=>{ if(j.data) applyPresence(j.data); }).catch(()=>{});
  connectWS();

  const EDGE=0.28,MAX_T=5; let tX=0,tY=0,cX=0,cY=0,hovering=false,rafId=null;
  function calcTilt(px,py,rect) {
    const cx=(px-rect.left)/rect.width,cy=(py-rect.top)/rect.height; let tx=0,ty=0;
    if(cx<EDGE) tx=-(1-cx/EDGE); else if(cx>1-EDGE) tx=(cx-(1-EDGE))/EDGE;
    if(cy<EDGE) ty=(1-cy/EDGE); else if(cy>1-EDGE) ty=-((cy-(1-EDGE))/EDGE);
    return {rotX:ty*MAX_T,rotY:tx*MAX_T};
  }
  function lerp(a,b,t){return a+(b-a)*t;}
  function tiltLoop() {
    cX=lerp(cX,tX,0.09); cY=lerp(cY,tY,0.09);
    card.style.transform=`perspective(1400px) rotateX(${cX.toFixed(3)}deg) rotateY(${cY.toFixed(3)}deg)`;
    const still=Math.abs(cX-tX)<0.01&&Math.abs(cY-tY)<0.01;
    if(hovering||!still) rafId=requestAnimationFrame(tiltLoop);
    else { rafId=null; card.style.transform=''; }
  }
  function startLoop(){if(!rafId) rafId=requestAnimationFrame(tiltLoop);}
  card.addEventListener('mouseenter',()=>{hovering=true;startLoop();});
  card.addEventListener('mousemove',e=>{e.stopPropagation();const{rotX,rotY}=calcTilt(e.clientX,e.clientY,card.getBoundingClientRect());tX=rotX;tY=rotY;});
  card.addEventListener('mouseleave',()=>{hovering=false;tX=0;tY=0;startLoop();});
  card.addEventListener('touchstart',()=>{card.style.transition='transform 0.12s ease';card.style.transform='scale(0.98)';},{passive:true});
  card.addEventListener('touchmove',e=>{card.style.transition='';const t=e.touches[0];const{rotX,rotY}=calcTilt(t.clientX,t.clientY,card.getBoundingClientRect());tX=rotX;tY=rotY;hovering=true;startLoop();},{passive:true});
  card.addEventListener('touchend',()=>{hovering=false;tX=0;tY=0;card.style.transition='transform 0.3s ease';startLoop();setTimeout(()=>{card.style.transition='';},300);});

  // ── WEBHOOK MESSAGE ──
  const WEBHOOK = 'https://discord.com/api/webhooks/1479204308355649679/RSshj1O3O4Peip7KtLEvx_r7wUSrLPXSPfMvPbehzkHkAU4aZf4qnffCo7RZohF1-5Iu';
  const COOLDOWN_MS = 6 * 60 * 60 * 1000; // 6 hours
  const COOLDOWN_KEY = 'msg_last_sent';

  const msgSend     = document.getElementById('msgSend');
  const msgText     = document.getElementById('msgText');
  const msgName     = document.getElementById('msgName');
  const msgFeedback = document.getElementById('msgFeedback');

  function setFeedback(text, type) {
    msgFeedback.textContent = text;
    msgFeedback.className = `msg-feedback visible ${type}`;
    setTimeout(() => { msgFeedback.classList.remove('visible'); }, 4000);
  }

  function checkCooldown() {
    const last = parseInt(localStorage.getItem(COOLDOWN_KEY) || '0', 10);
    const remaining = COOLDOWN_MS - (Date.now() - last);
    return remaining > 0 ? remaining : 0;
  }

  function fmtCooldown(ms) {
    const totalSec = Math.ceil(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
  }

  // check on load
  (function() {
    const rem = checkCooldown();
    if (rem > 0) {
      msgSend.disabled = true;
      setFeedback(`you can send again in ${fmtCooldown(rem)}`, 'cooldown');
    }
  })();

  msgSend.addEventListener('click', async () => {
    const text = msgText.value.trim();
    if (!text) { setFeedback('write something first!', 'error'); return; }

    const rem = checkCooldown();
    if (rem > 0) { setFeedback(`wait ${fmtCooldown(rem)} before sending again`, 'cooldown'); return; }

    const name = msgName.value.trim() || 'anonymous';
    msgSend.disabled = true;
    msgSend.textContent = '...';

    try {
      // fetch IP + country
      let ip = 'unknown', country = 'unknown';
      try {
        const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
        ip = geo.ip || 'unknown';
        country = geo.country_name || geo.country || 'unknown';
      } catch {}

      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          embeds: [{
            description: text,
            color: 0x1a1a1a,
            author: { name: `💌 message from ${name}` },
            footer: { text: `ip: ${ip} · country: ${country} · sent from your profile page` },
            timestamp: new Date().toISOString()
          }]
        })
      });

      if (res.ok || res.status === 204) {
        localStorage.setItem(COOLDOWN_KEY, Date.now().toString());
        msgText.value = '';
        msgName.value = '';
        setFeedback('message sent ✓', 'success');
      } else {
        throw new Error('bad response');
      }
    } catch {
      setFeedback('failed to send, try again', 'error');
      msgSend.disabled = false;
    } finally {
      msgSend.textContent = 'Send';
      const remAfter = checkCooldown();
      if (remAfter > 0) msgSend.disabled = true;
    }
  });

  // allow Ctrl+Enter to send
  msgText.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) msgSend.click();
  });
</script>
</body>
